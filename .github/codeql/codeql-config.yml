name: "XKeen Control Panel CodeQL Config"

# Настройка запросов CodeQL для проекта.
# Используем security-extended и security-and-quality наборы запросов.
# Добавляем query-filter для исключения false positive алертов go/path-injection
# в файлах-утилитах, где пути уже валидируются через PathValidator
# с HasPrefix check + EvalSymlinks (symlink resolution) перед любой файловой операцией.
queries:
  - uses: security-extended
  - uses: security-and-quality

paths-ignore:
  - "internal/utils/file.go"
  - "internal/services/config.go"
  - "internal/services/subscription.go"
