name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Версия (например: 0.1.0)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Download Go dependencies
        run: go mod download

      - name: Run Go tests
        run: go test -v -race ./...

      - name: Run Go vet
        run: go vet ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    strategy:
      matrix:
        include:
          - GOARCH: arm64
            name: arm64
          - GOARCH: mipsle
            GOMIPS: softfloat
            name: mipsle
          - GOARCH: mips
            GOMIPS: softfloat
            name: mips

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_STABLE="true"
            SKIP="false"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="v${{ github.event.inputs.version }}"
            IS_STABLE="true"
            SKIP="false"
          else
            # Проверяем, не запущен ли рабочий процесс для ветки main, но при этом текущий коммит уже протегирован стабильной версией
            EXACT_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
            if echo "$EXACT_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "HEAD is exactly tagged as stable ($EXACT_TAG). Skipping redundant branch-triggered build."
              SKIP="true"
              VERSION="$EXACT_TAG"
              IS_STABLE="true"
            else
              SKIP="false"
              
              # Read version from frontend/package.json
              PKG_VERSION=$(grep -o '"version": "[^"]*' frontend/package.json 2>/dev/null | cut -d'"' -f4 || echo "0.0.0")
              if [[ "$PKG_VERSION" == v* ]]; then
                VERSION="$PKG_VERSION"
              else
                VERSION="v$PKG_VERSION"
              fi
              IS_STABLE="false"
              
              # Calculate commit count since the last stable tag for build notes
              LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-' | sort -V | tail -1 2>/dev/null)
              if [ -n "$LATEST_TAG" ]; then
                RANGE="${LATEST_TAG}..HEAD"
              else
                RANGE="HEAD"
              fi
              COMMIT_COUNT=$(git rev-list "$RANGE" --count 2>/dev/null || git rev-list HEAD --count)
              echo "commit_count=${COMMIT_COUNT}" >> $GITHUB_OUTPUT
            fi
          fi
          
          PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].number' 2>/dev/null || echo "")
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_stable=${IS_STABLE}" >> $GITHUB_OUTPUT
          echo "skip=${SKIP}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION} (stable=${IS_STABLE}, pr=${PR_NUMBER}, skip=${SKIP})"

      - name: Set up Node.js
        if: steps.version.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Update frontend package version
        if: steps.version.outputs.skip != 'true'
        run: |
          cd frontend
          VERSION_CLEAN=$(echo "${{ steps.version.outputs.version }}" | sed 's/^v//')
          npm version $VERSION_CLEAN --no-git-tag-version --allow-same-version

      - name: Build frontend
        if: steps.version.outputs.skip != 'true'
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Go
        if: steps.version.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Build binary
        if: steps.version.outputs.skip != 'true'
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          GOMIPS: ${{ matrix.GOMIPS }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o build/xcp_${VERSION}_${{ matrix.name }} ./cmd/xcp

      - name: Compress with UPX (pre-release only)
        if: steps.version.outputs.skip != 'true' && steps.version.outputs.is_stable != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma build/xcp_${VERSION}_${{ matrix.name }} -o build/xcp_${VERSION}_${{ matrix.name }}_upx
          mv build/xcp_${VERSION}_${{ matrix.name }}_upx build/xcp_${VERSION}_${{ matrix.name }}

      - name: Generate checksum
        if: steps.version.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd build
          sha256sum xcp_${VERSION}_${{ matrix.name }} > xcp_${VERSION}_${{ matrix.name }}.sha256

      - name: Upload artifact
        if: steps.version.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: xcp_${{ matrix.name }}
          path: |
            build/xcp_${{ steps.version.outputs.version }}_${{ matrix.name }}
            build/xcp_${{ steps.version.outputs.version }}_${{ matrix.name }}.sha256

    outputs:
      version: ${{ steps.version.outputs.version }}
      is_stable: ${{ steps.version.outputs.is_stable }}
      commit_count: ${{ steps.version.outputs.commit_count }}
      pr_number: ${{ steps.version.outputs.pr_number }}
      skip: ${{ steps.version.outputs.skip }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && needs.build.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Rolling pre-release
        if: needs.build.outputs.is_stable != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          COMMIT_COUNT: ${{ needs.build.outputs.commit_count }}
          PR_NUMBER: ${{ needs.build.outputs.pr_number }}
          MODE: prerelease
        run: |
          python3 .github/scripts/gen_notes.py

          # Удаляем старый rolling pre-release и тег
          gh release delete "${VERSION}" --yes 2>/dev/null || true
          git tag -d "${VERSION}" 2>/dev/null || true
          git push origin --delete "refs/tags/${VERSION}" 2>/dev/null || true

          # Создаём новый tag на текущем HEAD (force на случай race condition)
          git tag -f "${VERSION}" "${GITHUB_SHA}"
          git push origin -f "${VERSION}"

          if [ -n "${PR_NUMBER}" ]; then
            TITLE="${VERSION} · PR #${PR_NUMBER}"
          else
            TITLE="${VERSION} · build #${COMMIT_COUNT}"
          fi

          gh release create "${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "${TITLE}" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
            artifacts/xcp_arm64/xcp_${VERSION}_arm64 \
            artifacts/xcp_arm64/xcp_${VERSION}_arm64.sha256 \
            artifacts/xcp_mipsle/xcp_${VERSION}_mipsle \
            artifacts/xcp_mipsle/xcp_${VERSION}_mipsle.sha256 \
            artifacts/xcp_mips/xcp_${VERSION}_mips \
            artifacts/xcp_mips/xcp_${VERSION}_mips.sha256

      - name: Create stable release
        if: needs.build.outputs.is_stable == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          PR_NUMBER: ${{ needs.build.outputs.pr_number }}
          MODE: stable
        run: |
          if echo "$VERSION" | grep -qvE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid stable version format: $VERSION"
            exit 1
          fi

          python3 .github/scripts/gen_notes.py

          gh release create "${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --notes-file /tmp/release-notes.md \
            artifacts/xcp_arm64/xcp_${VERSION}_arm64 \
            artifacts/xcp_arm64/xcp_${VERSION}_arm64.sha256 \
            artifacts/xcp_mipsle/xcp_${VERSION}_mipsle \
            artifacts/xcp_mipsle/xcp_${VERSION}_mipsle.sha256 \
            artifacts/xcp_mips/xcp_${VERSION}_mips \
            artifacts/xcp_mips/xcp_${VERSION}_mips.sha256

          # Удаляем rolling pre-release этой же версии (cleanup)
          ROLLING_TAG="${VERSION}-dev"
          echo "Cleaning up rolling pre-release ${ROLLING_TAG}..."
          gh release delete "${ROLLING_TAG}" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/${ROLLING_TAG}" 2>/dev/null || true

      - name: Update binaries branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git fetch origin binaries 2>/dev/null || true
          git checkout -b binaries origin/binaries 2>/dev/null || git checkout --orphan binaries
          
          git rm -rf . 2>/dev/null || true
          mkdir -p bin
          cp artifacts/xcp_arm64/xcp_${VERSION}_arm64 bin/
          cp artifacts/xcp_arm64/xcp_${VERSION}_arm64.sha256 bin/
          cp artifacts/xcp_mipsle/xcp_${VERSION}_mipsle bin/
          cp artifacts/xcp_mipsle/xcp_${VERSION}_mipsle.sha256 bin/
          cp artifacts/xcp_mips/xcp_${VERSION}_mips bin/
          cp artifacts/xcp_mips/xcp_${VERSION}_mips.sha256 bin/
          
          git add bin/
          git commit -m "${VERSION}" || true
          git push origin binaries --force

  cleanup:
    name: Cleanup artifacts
    runs-on: ubuntu-latest
    needs: release
    if: always() && github.actor != 'dependabot[bot]'
    steps:
      - uses: geekyeggo/delete-artifact@v6
        with:
          name: xcp_*
