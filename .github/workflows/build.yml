name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Версия (например: 0.1.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Download Go dependencies
        run: go mod download

      - name: Run Go tests
        run: go test -v -race ./...

      - name: Run Go vet
        run: go vet ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOARCH: arm64
            name: arm64
          - GOARCH: mipsle
            GOMIPS: softfloat
            name: mipsle
          - GOARCH: mips
            GOMIPS: softfloat
            name: mips

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Calculate version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Stable release from tag
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_STABLE="true"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="v${{ github.event.inputs.version }}"
            IS_STABLE="true"
          else
            # Pre-release from push to main
            LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-' | sort -V | tail -1 2>/dev/null)
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v0.0.0"
            fi
            
            BASE=${LATEST_TAG#v}
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            NEXT_MINOR=$((MINOR + 1))
            
            COMMIT_COUNT=$(git rev-list "${LATEST_TAG}..HEAD" --count 2>/dev/null || echo "0")
            if [ "$COMMIT_COUNT" = "0" ]; then
              COMMIT_COUNT=$(git rev-list --count HEAD)
            fi
            
            VERSION="v${MAJOR}.${NEXT_MINOR}.0-dev.${COMMIT_COUNT}"
            IS_STABLE="false"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_stable=${IS_STABLE}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION} (stable=${IS_STABLE})"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          GOMIPS: ${{ matrix.GOMIPS }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o build/xkeen-control-panel-${{ matrix.name }} ./cmd/xcp

      - name: Compress with UPX (pre-release only)
        if: steps.version.outputs.is_stable != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma build/xkeen-control-panel-${{ matrix.name }} -o build/xkeen-control-panel-${{ matrix.name }}-upx
          mv build/xkeen-control-panel-${{ matrix.name }}-upx build/xkeen-control-panel-${{ matrix.name }}

      - name: Generate checksum
        run: |
          cd build
          sha256sum xkeen-control-panel-${{ matrix.name }} > xkeen-control-panel-${{ matrix.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xkeen-control-panel-${{ matrix.name }}
          path: |
            build/xkeen-control-panel-${{ matrix.name }}
            build/xkeen-control-panel-${{ matrix.name }}.sha256

    outputs:
      version: ${{ steps.version.outputs.version }}
      is_stable: ${{ steps.version.outputs.is_stable }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create pre-release
        if: needs.build.outputs.is_stable != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Delete old dev pre-releases
          gh release list --limit 50 --json tagName,isPrerelease | \
            jq -r '.[] | select(.tagName | test("-dev\\.")) | .tagName' | \
            while read tag; do
              echo "Deleting old dev release: $tag"
              gh release delete "$tag" --yes 2>/dev/null || true
              git push --delete origin "$tag" 2>/dev/null || true
            done

          # Получить последние 15 коммитов для changelog
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" -15 2>/dev/null || echo "Список изменений недоступен")

          cat > /tmp/release-notes.md << ENDNOTES
          ⚠️ **Это dev-сборка для тестирования.** Не используйте в production.

          | Свойство | Значение |
          |----------|----------|
          | Версия | \`${VERSION}\` |
          | Коммит | \`${SHORT_SHA}\` |
          | Дата сборки | $(date -u +%Y-%m-%dT%H:%M:%SZ) |

          ### Изменения

          ${CHANGELOG}

          ### Архитектуры

          - **ARM64** — `xkeen-control-panel-arm64`
          - **MIPSLE** — `xkeen-control-panel-mipsle`
          - **MIPS** — `xkeen-control-panel-mips`
          ENDNOTES

          gh release create "${VERSION}" \
            --title "Dev ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64 \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64.sha256 \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle.sha256 \
            artifacts/xkeen-control-panel-mips/xkeen-control-panel-mips \
            artifacts/xkeen-control-panel-mips/xkeen-control-panel-mips.sha256

      - name: Create stable release
        if: needs.build.outputs.is_stable == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          # Валидация формата
          if echo "$VERSION" | grep -qvE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid stable version format: $VERSION"
            exit 1
          fi

          # Найти предыдущий stable тег для списка изменений
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-' | sort -V | tail -2 | head -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$VERSION" ]; then
            CHANGELOG="Первый релиз."
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${VERSION}" 2>/dev/null || echo "Список изменений недоступен")
          fi

          cat > /tmp/release-notes.md << EOF
          ### Что нового

          ${CHANGELOG}

          ### Архитектуры

          - **ARM64** — `xkeen-control-panel-arm64`
          - **MIPSLE** — `xkeen-control-panel-mipsle`
          - **MIPS** — `xkeen-control-panel-mips`

          ### Установка
          \`\`\`sh
          chmod +x xkeen-control-panel-arm64
          ./xkeen-control-panel-arm64 install
          /opt/etc/init.d/S99xkeen-control-panel start
          \`\`\`

          Доступ: \`http://<ip-роутера>:8089\`
          EOF

          gh release create "${VERSION}" \
            --title "XKeen Control Panel ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64 \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64.sha256 \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle.sha256 \
            artifacts/xkeen-control-panel-mips/xkeen-control-panel-mips \
            artifacts/xkeen-control-panel-mips/xkeen-control-panel-mips.sha256

  cleanup:
    name: Cleanup artifacts
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: xkeen-control-panel-*
