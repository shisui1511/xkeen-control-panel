name: Build and Release (Stable)

# Стабильные релизы: срабатывает на теги v* (без дефиса)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Версия (например: 0.1.0)"
        required: true
        type: string

# Отменяет предыдущие запуски для того же тега
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Job 1: Тестирование
  test:
    name: Test
    # Выполняем только если тег НЕ содержит '-' (т.е. это не pre-release)
    if: |
      (github.event_name == 'workflow_dispatch' && contains(github.event.inputs.version, '-') == false) ||
      (github.event_name == 'push' && contains(github.ref, '-') == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Download Go dependencies
        run: go mod download

      - name: Run Go tests
        run: go test -v -race ./...

      - name: Run Go vet
        run: go vet ./...

  # Job 2: Сборка бинарников
  build:
    name: Build Stable Release
    needs: test
    # Те же условия, что и для test
    if: |
      (github.event_name == 'workflow_dispatch' && contains(github.event.inputs.version, '-') == false) ||
      (github.event_name == 'push' && contains(github.ref, '-') == false)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOARCH: arm64
            name: arm64
          - GOARCH: mipsle
            GOMIPS: softfloat
            name: mipsle
          - GOARCH: mips
            GOMIPS: softfloat
            name: mips

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="v${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          GOMIPS: ${{ matrix.GOMIPS }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o build/xkeen-control-panel-${{ matrix.name }} ./cmd/xcp

      - name: Generate checksum
        run: |
          cd build
          sha256sum xkeen-control-panel-${{ matrix.name }} > xkeen-control-panel-${{ matrix.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xkeen-control-panel-${{ matrix.name }}
          path: |
            build/xkeen-control-panel-${{ matrix.name }}
            build/xkeen-control-panel-${{ matrix.name }}.sha256

    outputs:
      version: ${{ steps.version.outputs.version }}

  # Job 3: Создание релиза
  release:
    name: Create Stable Release
    needs: build
    # Те же условия, что и для build
    if: |
      (github.event_name == 'workflow_dispatch' && contains(github.event.inputs.version, '-') == false) ||
      (github.event_name == 'push' && contains(github.ref, '-') == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          # Валидация формата: vMAJOR.MINOR.PATCH (без -dev)
          if echo "$VERSION" | grep -qvE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid stable version format: $VERSION"
            echo "Expected: vMAJOR.MINOR.PATCH (e.g., v0.1.0)"
            exit 1
          fi

          cat > /tmp/release-notes.md << EOF
          ## XKeen Control Panel ${VERSION}

          Стабильный релиз.

          ### Изменения
          
          $(git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD 2>/dev/null || echo "Первый релиз")

          ### Поддерживаемые устройства

          **ARM64** (xkeen-control-panel-arm64):
          - KN-1810, KN-1910
          - Другие Keenetic с ARM64 и Entware

          **MIPSLE** (xkeen-control-panel-mipsle):
          - KN-1912 Viva, KN-2410
          - Другие Keenetic с MIPSLE и Entware

          **MIPS** (xkeen-control-panel-mips):
          - Старые модели Keenetic с MIPS и Entware

          ### Установка
          \`\`\`sh
          chmod +x xkeen-control-panel-arm64  # выберите свою архитектуру
          ./xkeen-control-panel-arm64 install
          /opt/etc/init.d/S99xkeen-control-panel start
          \`\`\`

          Доступ: \`http://<ip-роутера>:8089\`
          EOF

          gh release create "${VERSION}" \
            --title "XKeen Control Panel ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64 \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64.sha256 \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle.sha256 \
            artifacts/xkeen-control-panel-mips/xkeen-control-panel-mips \
            artifacts/xkeen-control-panel-mips/xkeen-control-panel-mips.sha256

  # Job 4: Очистка артефактов
  cleanup:
    name: Cleanup artifacts
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: xkeen-control-panel-*
