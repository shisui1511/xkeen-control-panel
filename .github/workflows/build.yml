name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Версия (например: 0.1.0)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Download Go dependencies
        run: go mod download

      - name: Run Go tests
        run: go test -v -race ./...

      - name: Run Go vet
        run: go vet ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOARCH: arm64
            name: arm64
          - GOARCH: mipsle
            GOMIPS: softfloat
            name: mipsle
          - GOARCH: mips
            GOMIPS: softfloat
            name: mips

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Calculate version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_STABLE="true"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="v${{ github.event.inputs.version }}"
            IS_STABLE="true"
          else
            LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-' | sort -V | tail -1 2>/dev/null)
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v0.0.0"
            fi
            
            BASE=${LATEST_TAG#v}
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            NEXT_MINOR=$((MINOR + 1))
            
            # Rolling pre-release: v0.5.0-dev (без счётчика коммитов в имени)
            VERSION="v${MAJOR}.${NEXT_MINOR}.0-dev"
            IS_STABLE="false"
            
            # Счётчик коммитов для release notes
            COMMIT_COUNT=$(git rev-list "${LATEST_TAG}..HEAD" --count 2>/dev/null || echo "0")
            echo "commit_count=${COMMIT_COUNT}" >> $GITHUB_OUTPUT
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_stable=${IS_STABLE}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION} (stable=${IS_STABLE})"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          GOMIPS: ${{ matrix.GOMIPS }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o build/xcp_${VERSION}_${{ matrix.name }} ./cmd/xcp

      - name: Compress with UPX (pre-release only)
        if: steps.version.outputs.is_stable != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma build/xcp_${VERSION}_${{ matrix.name }} -o build/xcp_${VERSION}_${{ matrix.name }}_upx
          mv build/xcp_${VERSION}_${{ matrix.name }}_upx build/xcp_${VERSION}_${{ matrix.name }}

      - name: Generate checksum
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd build
          sha256sum xcp_${VERSION}_${{ matrix.name }} > xcp_${VERSION}_${{ matrix.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: xcp_${{ matrix.name }}
          path: |
            build/xcp_${{ steps.version.outputs.version }}_${{ matrix.name }}
            build/xcp_${{ steps.version.outputs.version }}_${{ matrix.name }}.sha256

    outputs:
      version: ${{ steps.version.outputs.version }}
      is_stable: ${{ steps.version.outputs.is_stable }}
      commit_count: ${{ steps.version.outputs.commit_count }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Rolling pre-release
        if: needs.build.outputs.is_stable != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          COMMIT_COUNT: ${{ needs.build.outputs.commit_count }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          
          # Находим последний stable tag для changelog
          LATEST_STABLE=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-' | sort -V | tail -1 2>/dev/null)
          if [ -n "$LATEST_STABLE" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s by @${GITHUB_ACTOR} in %h" "${LATEST_STABLE}..HEAD" 2>/dev/null || echo "Список изменений недоступен")
          else
            CHANGELOG=$(git log --pretty=format:"- %s by @${GITHUB_ACTOR} in %h" -15 2>/dev/null || echo "Список изменений недоступен")
          fi

          cat > /tmp/release-notes.md << ENDNOTES
          ⚠️ **Пре-релиз.** Не рекомендуется для production-использования.

          **Коммит:** \`${SHORT_SHA}\`  
          **Build:** ${COMMIT_COUNT} коммитов с ${LATEST_STABLE:-начала}  
          **Дата:** $(date -u +%Y-%m-%d)

          ## Что изменилось

          ${CHANGELOG}
          ENDNOTES

          # Удаляем старый rolling pre-release и тег (игнорируем ошибки если нет)
          echo "Deleting old rolling pre-release ${VERSION}..."
          gh release delete "${VERSION}" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/${VERSION}" 2>/dev/null || true

          # Создаём новый tag на текущем HEAD
          git tag "${VERSION}" "${GITHUB_SHA}"
          git push origin "${VERSION}"

          # Создаём новый release
          gh release create "${VERSION}" \
            --title "${VERSION} (build ${COMMIT_COUNT})" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
            artifacts/xcp_arm64/xcp_${VERSION}_arm64 \
            artifacts/xcp_arm64/xcp_${VERSION}_arm64.sha256 \
            artifacts/xcp_mipsle/xcp_${VERSION}_mipsle \
            artifacts/xcp_mipsle/xcp_${VERSION}_mipsle.sha256 \
            artifacts/xcp_mips/xcp_${VERSION}_mips \
            artifacts/xcp_mips/xcp_${VERSION}_mips.sha256

      - name: Create stable release
        if: needs.build.outputs.is_stable == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if echo "$VERSION" | grep -qvE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid stable version format: $VERSION"
            exit 1
          fi

          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-' | sort -V | tail -2 | head -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$VERSION" ]; then
            CHANGELOG="Initial release."
          else
            CHANGELOG=$(git log --pretty=format:"- %s by @${GITHUB_ACTOR} in %h" "${PREV_TAG}..${VERSION}" 2>/dev/null || echo "Changelog unavailable")
          fi

          cat > /tmp/release-notes.md << EOF
          ## Что изменилось

          ${CHANGELOG}

          **Полный список изменений:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}

          ---

          ## Установка

          Установка одной командой:
          \`\`\`sh
          curl -Ls https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/setup.sh | sh
          \`\`\`

          Или скачайте бинарник для вашей архитектуры, сделайте его исполняемым и запустите:
          \`\`\`sh
          ./xcp_${VERSION}_<arch> -version
          \`\`\`
          EOF

          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes-file /tmp/release-notes.md \
            artifacts/xcp_arm64/xcp_${VERSION}_arm64 \
            artifacts/xcp_arm64/xcp_${VERSION}_arm64.sha256 \
            artifacts/xcp_mipsle/xcp_${VERSION}_mipsle \
            artifacts/xcp_mipsle/xcp_${VERSION}_mipsle.sha256 \
            artifacts/xcp_mips/xcp_${VERSION}_mips \
            artifacts/xcp_mips/xcp_${VERSION}_mips.sha256

          # Удаляем rolling pre-release этой же версии (cleanup)
          ROLLING_TAG="${VERSION%.*}.0-dev"
          echo "Cleaning up rolling pre-release ${ROLLING_TAG}..."
          gh release delete "${ROLLING_TAG}" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/${ROLLING_TAG}" 2>/dev/null || true

      - name: Update binaries branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git fetch origin binaries 2>/dev/null || true
          git checkout -b binaries origin/binaries 2>/dev/null || git checkout --orphan binaries
          
          git rm -rf . 2>/dev/null || true
          mkdir -p bin
          cp artifacts/xcp_arm64/xcp_${VERSION}_arm64 bin/
          cp artifacts/xcp_mipsle/xcp_${VERSION}_mipsle bin/
          cp artifacts/xcp_mips/xcp_${VERSION}_mips bin/
          
          git add bin/
          git commit -m "${VERSION}" || true
          git push origin binaries --force

  cleanup:
    name: Cleanup artifacts
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - uses: geekyeggo/delete-artifact@v6
        with:
          name: xcp_*
