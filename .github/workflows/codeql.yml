name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Раз в неделю, понедельник в 09:00 UTC
    - cron: '0 9 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript]
        # go       — backend (internal/, cmd/, embed.go)
        # javascript — frontend (Svelte + TypeScript)

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Для Go нужен собранный frontend/dist из-за go:embed
      - name: Set up Node.js (for Go embed)
        if: matrix.language == 'go'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build frontend (for Go embed)
        if: matrix.language == 'go'
        run: |
          cd frontend
          npm ci
          npm run build

      # Go должен быть установлен ДО codeql-action/init, чтобы CodeQL обернул go binary
      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql/codeql-config.yml

      - name: Build Go (for CodeQL extraction)
        if: matrix.language == 'go'
        run: |
          go mod download
          go build ./...

      # Для JS/TS нужен node_modules для точного анализа импортов
      - name: Set up Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: matrix.language == 'javascript'
        run: |
          cd frontend
          npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
