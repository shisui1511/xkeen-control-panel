name: Dev Build

# Dev-сборки при каждом пуше в dev
on:
  push:
    branches:
      - dev
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'frontend/**'
      - 'embed.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-dev.yml'

# Отменяет предыдущие запуски для того же PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Job 1: Тестирование и линтинг
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true # Автоматическое кэширование Go модулей

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run build

      - name: Download Go dependencies
        run: go mod download

      - name: Run Go tests
        run: go test -v -coverprofile=coverage.out ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # Job 2: Сборка бинарников
  build:
    name: Build Dev Pre-Release
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOARCH: arm64
            name: arm64
          - GOARCH: mipsle
            GOMIPS: softfloat
            name: mipsle

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Calculate version
        id: version
        run: |
          # Получаем последний stable-тег
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-' | sort -V | tail -1 2>/dev/null)
          
          # Если stable-тегов нет, используем v0.0.0
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          
          echo "Latest stable tag: $LATEST_TAG"

          BASE=${LATEST_TAG#v}
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          # Формат: v0.MINOR.PATCH-dev.RUN_NUMBER
          VERSION="v${MAJOR}.${MINOR}.${PATCH}-dev.${GITHUB_RUN_NUMBER}"
          
          echo "VERSION=$VERSION"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          GOMIPS: ${{ matrix.GOMIPS }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o build/xkeen-control-panel-${{ matrix.name }} ./cmd/xcp

      - name: Compress with UPX
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma build/xkeen-control-panel-${{ matrix.name }} -o build/xkeen-control-panel-${{ matrix.name }}-upx
          mv build/xkeen-control-panel-${{ matrix.name }}-upx build/xkeen-control-panel-${{ matrix.name }}

      - name: Generate checksum
        run: |
          cd build
          sha256sum xkeen-control-panel-${{ matrix.name }} > xkeen-control-panel-${{ matrix.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xkeen-control-panel-${{ matrix.name }}
          path: |
            build/xkeen-control-panel-${{ matrix.name }}
            build/xkeen-control-panel-${{ matrix.name }}.sha256

    outputs:
      version: ${{ steps.version.outputs.version }}

  # Job 3: Создание релиза
  release:
    name: Create Dev Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"

          echo "Creating release with version: ${VERSION}"

          # Удаляем старые dev-релизы
          gh release list --limit 50 --json tagName,isPrerelease | \
            jq -r '.[] | select(.tagName | test("-dev\\.")) | .tagName' | \
            while read tag; do
              echo "Deleting old dev release: $tag"
              gh release delete "$tag" --yes 2>/dev/null || true
              git push --delete origin "$tag" 2>/dev/null || true
            done

          # Создаём релиз
          cat > /tmp/release-notes.md << ENDNOTES
          ## Тестовый билд

          **Это dev-сборка.** Используйте только для тестирования.

          | Свойство | Значение |
          |----------|----------|
          | Версия | \`${VERSION}\` |
          | Коммит | \`${SHORT_SHA}\` |
          | Дата сборки | $(date -u +%Y-%m-%dT%H:%M:%SZ) |

          ### Изменения в этой сборке
          
          $(git log --pretty=format:"- %s (%h)" -10)

          ### Поддерживаемые устройства

          **ARM64** (xkeen-control-panel-arm64):
          - KN-1810, KN-1910
          - Другие Keenetic с ARM64 и Entware

          **MIPSLE** (xkeen-control-panel-mipsle):
          - KN-1912 Viva, KN-2410
          - Другие Keenetic с MIPSLE и Entware

          ### Установка
          \`\`\`sh
          chmod +x xkeen-control-panel-arm64
          ./xkeen-control-panel-arm64 install
          /opt/etc/init.d/S99xkeen-control-panel restart
          \`\`\`
          ENDNOTES

          gh release create "${VERSION}" \
            --title "Тестовый билд ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64 \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64.sha256 \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle.sha256

  # Job 4: Очистка артефактов
  cleanup:
    name: Cleanup artifacts
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: xkeen-control-panel-*
