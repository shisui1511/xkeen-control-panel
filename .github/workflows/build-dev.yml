name: Dev Build

# Dev-сборки при каждом пуше в dev
on:
  push:
    branches:
      - dev
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'frontend/**'
      - 'embed.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-dev.yml'

permissions:
  contents: write

jobs:
  build:
    name: Build Dev Pre-Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOARCH: arm64
            name: arm64
          - GOARCH: mipsle
            GOMIPS: softfloat
            name: mipsle

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          GOMIPS: ${{ matrix.GOMIPS }}
          CGO_ENABLED: 0
          VERSION: dev.${{ github.run_number }}.${{ github.run_attempt }}
        run: |
          go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o build/xkeen-control-panel-${{ matrix.name }} ./cmd/xcp

      - name: Compress with UPX
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma build/xkeen-control-panel-${{ matrix.name }} -o build/xkeen-control-panel-${{ matrix.name }}-upx
          mv build/xkeen-control-panel-${{ matrix.name }}-upx build/xkeen-control-panel-${{ matrix.name }}

      - name: Generate checksum
        run: |
          cd build
          sha256sum xkeen-control-panel-${{ matrix.name }} > xkeen-control-panel-${{ matrix.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xkeen-control-panel-${{ matrix.name }}
          path: |
            build/xkeen-control-panel-${{ matrix.name }}
            build/xkeen-control-panel-${{ matrix.name }}.sha256

  release:
    name: Create Dev Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set version and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Получаем последний stable-тег
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-' | sort -V | tail -1 2>/dev/null)
          
          # Если stable-тегов нет, используем v0.0.0 (следующий будет v0.0.1-dev.N)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          
          echo "Latest stable tag: $LATEST_TAG"

          BASE=${LATEST_TAG#v}

          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          VERSION="v${MAJOR}.${MINOR}.0-dev.${GITHUB_RUN_NUMBER}"

          echo "VERSION=$VERSION"

          # Удаляем старые dev-релизы
          gh release list --limit 50 --json tagName,isPrerelease | \
            jq -r '.[] | select(.tagName | test("-dev\\.")) | .tagName' | \
            while read tag; do
              echo "Deleting old dev release: $tag"
              gh release delete "$tag" --yes 2>/dev/null || true
              git push --delete origin "$tag" 2>/dev/null || true
            done

          # Создаём релиз
          cat > /tmp/release-notes.md << ENDNOTES
          ## Тестовый билд

          **Это dev-сборка.** Используйте только для тестирования.

          | Свойство | Значение |
          |----------|----------|
          | Версия | \`${VERSION}\` |
          | Коммит | \`${SHORT_SHA}\` |
          | Дата сборки | $(date -u +%Y-%m-%dT%H:%M:%SZ) |

          ### Поддерживаемые устройства

          **ARM64** (xkeen-control-panel-arm64):
          - KN-1810, KN-1910
          - Другие Keenetic с ARM64 и Entware

          **MIPSLE** (xkeen-control-panel-mipsle):
          - KN-1912 Viva, KN-2410
          - Другие Keenetic с MIPSLE и Entware

          ### Установка
          \`\`\`sh
          chmod +x xkeen-control-panel-arm64
          ./xkeen-control-panel-arm64 install
          /opt/etc/init.d/S99xkeen-control-panel restart
          \`\`\`
          ENDNOTES

          echo "Creating release with tag: ${VERSION}"
          gh release create "${VERSION}" \
            --title "Тестовый билд ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64 \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64.sha256 \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle.sha256

  cleanup:
    name: Cleanup artifacts
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: xkeen-control-panel-*
