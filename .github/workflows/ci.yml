name: CI

# Запускается только на pull requests
on:
  pull_request:
    branches:
      - main
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Отменяет предыдущие запуски для того же PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # Job 1: Линтинг Go кода
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Frontend нужен для go:embed (embed.go ссылается на frontend/dist)
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Download Go dependencies
        env:
          GOTOOLCHAIN: local
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: .
          args: --timeout=5m
          install-mode: goinstall

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          repo-checkout: false

  # Job 2: Тестирование Go кода
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Frontend нужен для go:embed
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Download dependencies
        env:
          GOTOOLCHAIN: local
        run: go mod download

      - name: Run tests
        run: go test -race -v -coverprofile=coverage.out ./...

      - name: Upload coverage to artifact
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

      - name: Display coverage
        run: go tool cover -func=coverage.out

  # Job 3: Линтинг и сборка Frontend
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Check Formatting
        run: |
          cd frontend
          npm run format:check

      - name: Lint Svelte & TypeScript
        run: |
          cd frontend
          npm run lint

      - name: Check token contrast (WCAG AA)
        run: |
          cd frontend
          npm run check:contrast

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Report bundle size
        uses: preactjs/compressed-size-action@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          cwd: frontend
          pattern: "dist/assets/*.{js,css}"
          strip-hash: "-[a-zA-Z0-9_-]{8}"
          build-script: "npm run build"

  # Job 4: Тестирование Frontend (E2E)
  test-frontend:
    name: Test Frontend E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Build Go backend
        run: |
          go mod download
          go build -ldflags="-s -w" -o xcp ./cmd/xcp

      - name: Run Go backend
        run: |
          mkdir -p /tmp/xcp-data
          cat > config.json <<EOF
          {
            "port": 8090,
            "data_dir": "/tmp/xcp-data",
            "https": { "enabled": false }
          }
          EOF
          ./xcp -config config.json &
          sleep 2

      - name: Run Playwright tests
        run: |
          cd frontend
          npm run test:e2e

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # Job 5: Проверка сборки
  build-check:
    name: Build Check
    needs: [lint-go, test-go, lint-frontend, test-frontend, check-rules]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOARCH: arm64
            name: arm64
          - GOARCH: mipsle
            GOMIPS: softfloat
            name: mipsle

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          GOMIPS: ${{ matrix.GOMIPS }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=ci-test" \
            -o xcp-${{ matrix.name }} ./cmd/xcp

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s "xcp-${{ matrix.name }}")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Binary size: ${SIZE_MB}MB"
          
          # Предупреждение если бинарник больше 50MB
          if [ $SIZE_MB -gt 50 ]; then
            echo "::warning::Binary size is larger than 50MB: ${SIZE_MB}MB"
          fi

  # Job 6: Проверка правил коммитов и синхронизации локализации
  check-rules:
    name: Verify Commits & i18n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check i18n translations
        run: node scripts/check-i18n.js

      - name: Check commit messages
        run: |
          node scripts/check-commits.js "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
