name: RC Build

on:
  push:
    branches:
      - rc
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'frontend/**'
      - 'embed.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-rc.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build RC Pre-Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOARCH: arm64
            name: arm64
          - GOARCH: mipsle
            GOMIPS: softfloat
            name: mipsle
          - GOARCH: mips
            GOMIPS: softfloat
            name: mips

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Calculate version
        id: version
        run: |
          # Find latest stable tag (no pre-release suffix)
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-' | sort -V | tail -1 2>/dev/null)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          
          BASE=${LATEST_TAG#v}
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)

          # RC branch builds NEXT minor version (release candidate)
          # Example: stable v0.3.0 -> rc builds v0.4.0-rc.N
          NEXT_MINOR=$((MINOR + 1))
          
          # Use commit count since last stable for build number
          COMMIT_COUNT=$(git rev-list "${LATEST_TAG}..HEAD" --count 2>/dev/null || echo "0")
          if [ "$COMMIT_COUNT" = "0" ]; then
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi
          
          VERSION="v${MAJOR}.${NEXT_MINOR}.0-rc.${COMMIT_COUNT}"
          
          echo "latest_stable=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          GOMIPS: ${{ matrix.GOMIPS }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o build/xkeen-control-panel-${{ matrix.name }} ./cmd/xcp

      - name: Compress with UPX
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma build/xkeen-control-panel-${{ matrix.name }} -o build/xkeen-control-panel-${{ matrix.name }}-upx
          mv build/xkeen-control-panel-${{ matrix.name }}-upx build/xkeen-control-panel-${{ matrix.name }}

      - name: Generate checksum
        run: |
          cd build
          sha256sum xkeen-control-panel-${{ matrix.name }} > xkeen-control-panel-${{ matrix.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xkeen-control-panel-${{ matrix.name }}
          path: |
            build/xkeen-control-panel-${{ matrix.name }}
            build/xkeen-control-panel-${{ matrix.name }}.sha256

    outputs:
      version: ${{ steps.version.outputs.version }}

  release:
    name: Create RC Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"

          gh release list --limit 50 --json tagName,isPrerelease | \
            jq -r '.[] | select(.tagName | test("-rc\\.")) | .tagName' | \
            while read tag; do
              echo "Deleting old rc release: $tag"
              gh release delete "$tag" --yes 2>/dev/null || true
              git push --delete origin "$tag" 2>/dev/null || true
            done

          cat > /tmp/release-notes.md << ENDNOTES
          ## Release Candidate

          **Это RC-сборка (Release Candidate).** Готова к релизу, финальное тестирование.

          | Свойство | Значение |
          |----------|----------|
          | Версия | \`${VERSION}\` |
          | Коммит | \`${SHORT_SHA}\` |
          | Дата сборки | $(date -u +%Y-%m-%dT%H:%M:%SZ) |

          ### Изменения в этой сборке
          
          $(git log --pretty=format:"- %s (%h)" -10)

          ### Поддерживаемые устройства

          **ARM64** (xkeen-control-panel-arm64):
          - KN-1810, KN-1910
          - Другие Keenetic с ARM64 и Entware

          **MIPSLE** (xkeen-control-panel-mipsle):
          - KN-1912 Viva, KN-2410
          - Другие Keenetic с MIPSLE и Entware

          **MIPS** (xkeen-control-panel-mips):
          - Старые модели Keenetic с MIPS и Entware

          ### Установка
          \`\`\`sh
          chmod +x xkeen-control-panel-arm64  # выберите свою архитектуру
          ./xkeen-control-panel-arm64 install
          /opt/etc/init.d/S99xkeen-control-panel restart
          \`\`\`
          ENDNOTES

          gh release create "${VERSION}" \
            --title "RC ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64 \
            artifacts/xkeen-control-panel-arm64/xkeen-control-panel-arm64.sha256 \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle \
            artifacts/xkeen-control-panel-mipsle/xkeen-control-panel-mipsle.sha256 \
            artifacts/xkeen-control-panel-mips/xkeen-control-panel-mips \
            artifacts/xkeen-control-panel-mips/xkeen-control-panel-mips.sha256

  cleanup:
    name: Cleanup artifacts
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: xkeen-control-panel-*
