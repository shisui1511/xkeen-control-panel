name: Release

# Автоматический релиз при push в main
# Версия определяется по conventional commits (fix→patch, feat→minor, feat!→major)
on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new-release-published }}
      new_release_version: ${{ steps.release.outputs.new-release-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/exec

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > .releaserc.json << 'EOF'
          {
            "branches": ["main"],
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              [
                "@semantic-release/changelog",
                {
                  "changelogFile": "CHANGELOG.md"
                }
              ],
              [
                "@semantic-release/git",
                {
                  "assets": ["CHANGELOG.md", "Makefile"],
                  "message": "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
                }
              ],
              "@semantic-release/github"
            ],
            "preset": "conventionalcommits",
            "releaseRules": [
              {"type": "feat", "release": "minor"},
              {"type": "fix", "release": "patch"},
              {"type": "perf", "release": "patch"},
              {"type": "revert", "release": "patch"},
              {"type": "docs", "release": false},
              {"type": "style", "release": false},
              {"type": "refactor", "release": false},
              {"type": "test", "release": false},
              {"type": "build", "release": false},
              {"type": "ci", "release": false}
            ]
          }
          EOF

          npx semantic-release --dry-run 2>&1 | tee release-output.txt || true
          cat release-output.txt

          if grep -q "The next release version is" release-output.txt; then
            npx semantic-release
          else
            echo "No new release needed"
            echo "new-release-published=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Release Binaries
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOARCH: arm64
            name: arm64
          - GOARCH: mipsle
            GOMIPS: softfloat
            name: mipsle
          - GOARCH: mips
            GOMIPS: softfloat
            name: mips

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          GOMIPS: ${{ matrix.GOMIPS }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o build/xkeen-control-panel-${{ matrix.name }} ./cmd/xcp

      - name: Generate checksum
        run: |
          cd build
          sha256sum xkeen-control-panel-${{ matrix.name }} > xkeen-control-panel-${{ matrix.name }}.sha256

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          gh release upload "${VERSION}" \
            build/xkeen-control-panel-${{ matrix.name }} \
            build/xkeen-control-panel-${{ matrix.name }}.sha256 --clobber
