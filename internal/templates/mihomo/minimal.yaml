mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

proxy-providers:
  subscription:
    type: http
    url: "YOUR_SUBSCRIPTION_URL"
    path: ./providers/sub.yaml
    interval: 86400
    health-check:
      enable: true
      interval: 300
      url: "https://www.gstatic.com/generate_204"

proxy-groups:
  - name: "Proxy"
    type: select
    use:
      - subscription
    proxies:
      - DIRECT

rules:
  - GEOIP,private,DIRECT,no-resolve
  - MATCH,Proxy
