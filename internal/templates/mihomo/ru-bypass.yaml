mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 77.88.8.8
    - 1.1.1.1
  fallback:
    - 8.8.8.8
    - 8.8.4.4
  fallback-filter:
    geoip: true
    geoip-code: RU

proxy-providers:
  subscription:
    type: http
    url: "YOUR_SUBSCRIPTION_URL"
    path: ./providers/sub.yaml
    interval: 86400
    health-check:
      enable: true
      interval: 300
      url: "https://www.gstatic.com/generate_204"

proxy-groups:
  - name: "Заблокированные сервисы"
    type: select
    use:
      - subscription
    proxies:
      - DIRECT

  - name: "⚡️ Auto"
    type: url-test
    use:
      - subscription
    url: "https://www.gstatic.com/generate_204"
    interval: 300

  - name: "YouTube"
    type: select
    proxies:
      - "Заблокированные сервисы"
      - DIRECT

  - name: "Telegram"
    type: select
    proxies:
      - "Заблокированные сервисы"
      - DIRECT

  - name: "Discord"
    type: select
    proxies:
      - "Заблокированные сервисы"
      - DIRECT

  - name: "Meta"
    type: select
    proxies:
      - "Заблокированные сервисы"
      - DIRECT

rules:
  - GEOSITE,category-ads-all,REJECT
  - GEOSITE,youtube,YouTube
  - GEOSITE,telegram,Telegram
  - GEOSITE,discord,Discord
  - GEOSITE,facebook,Meta
  - GEOSITE,instagram,Meta
  - GEOIP,private,DIRECT,no-resolve
  - GEOIP,ru,DIRECT
  - GEOSITE,category-gov-ru,DIRECT
  - MATCH,Заблокированные сервисы
