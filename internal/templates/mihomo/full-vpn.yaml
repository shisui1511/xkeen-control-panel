mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

proxy-providers:
  subscription:
    type: http
    url: "YOUR_SUBSCRIPTION_URL"
    path: ./providers/sub.yaml
    interval: 86400
    health-check:
      enable: true
      interval: 300
      url: "https://www.gstatic.com/generate_204"

proxy-groups:
  - name: "VPN"
    type: select
    use:
      - subscription
    proxies:
      - "⚡️ Fastest"

  - name: "⚡️ Fastest"
    type: url-test
    use:
      - subscription
    url: "https://www.gstatic.com/generate_204"
    interval: 300

rules:
  - GEOIP,private,DIRECT,no-resolve
  - MATCH,VPN
